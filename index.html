<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Михаил & Полина | Свадьба</title>
    <style>
        /* Подключение шрифта Better Land RUS */
        @font-face {
            font-family: 'Better Land RUS';
            src: url('fonts/Better Land RUS.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: #f9f4ef;
        }

        /* каждый экран на всю высоту окна */
        .screen {
            min-height: 100vh;
            width: 100%;
            display: flex;
            background-size: cover;
            background-position: center;
        }

        /* первый экран – фон fon3.jpg */
        .screen-first {
            background-image: url('images/fon3.jpg');
        }

        /* второй экран – фон fon4.jpg */
        .screen-second {
            background-image: url('images/fon4.jpg');
        }

        /* левая колонка (белая, 40% ширины) для первого экрана */
        .left-column {
            width: 40%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
            min-height: 100vh;
        }

        /* правая колонка (белая, 60% ширины) для второго экрана */
        .right-column {
            width: 60%;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
            min-height: 100vh;
        }

        /* для пустых половин (не белых) */
        .empty {
            flex: 1;
        }

        /* Стили для левой колонки (имена с большими буквами и пунктирами) */
        .initial-large {
            font-family: 'Better Land RUS', 'Georgia', serif;
            font-size: 4rem;
            font-weight: normal;
            line-height: 1;
            color: #1a1a1a;
            margin: 10px 0 5px 0;
        }
        .dotted-line {
            border-top: 2px dashed #333;
            width: 80px;
            margin: 10px 0;
        }
        .names-elegant {
            font-family: 'Better Land RUS', 'Georgia', serif;
            font-size: 2rem;
            font-weight: normal;
            margin: 5px 0;
            color: #2c2c2c;
        }
        .ampersand {
            font-family: 'Better Land RUS', 'Georgia', serif;
            font-size: 1.8rem;
            margin: 5px 0;
            color: #2c2c2c;
        }

        /* стили для правой колонки (второй экран) */
        .greeting {
            font-size: 2rem;
            font-weight: bold;
            line-height: 1.1;
            color: #2c2c2c;
            margin-bottom: 1rem;
        }
        .invite-text {
            font-size: 0.95rem;
            line-height: 1.4;
            color: #2c2c2c;
            margin-bottom: 1.5rem;
        }
        .calendar {
            width: 100%;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 12px;
        }
        .month {
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 12px;
            color: #5d3a2c;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }
        .weekday {
            font-weight: bold;
            font-size: 0.65rem;
            color: #b0a69b;
            padding-bottom: 6px;
        }
        .calendar-day {
            background: #f5f0ea;
            padding: 5px 0;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        .calendar-day.highlight {
            background: #b0a69b;
            color: white;
        }

        /* адаптация для узких экранов */
        @media (max-width: 550px) {
            .left-column, .right-column {
                padding: 20px 15px;
            }
            .initial-large {
                font-size: 2.5rem;
            }
            .names-elegant {
                font-size: 1.5rem;
            }
            .ampersand {
                font-size: 1.3rem;
            }
            .dotted-line {
                width: 60px;
            }
            .greeting {
                font-size: 1.6rem;
            }
            .invite-text {
                font-size: 0.8rem;
            }
            .calendar-day {
                font-size: 0.65rem;
                padding: 3px 0;
            }
        }
    </style>
</head>
<body>

    <!-- ПЕРВЫЙ ЭКРАН: фон fon3.jpg, слева белая колонка 40% с именами, пунктирами, большими буквами -->
    <div class="screen screen-first">
        <div class="left-column">
            <div class="initial-large">М</div>
            <div class="dotted-line"></div>
            <div class="names-elegant">Михаил</div>
            <div class="ampersand">&</div>
            <div class="names-elegant">Полина</div>
            <div class="dotted-line"></div>
            <div class="initial-large">П</div>
        </div>
        <div class="empty"></div> <!-- 60% пустоты, виден фон -->
    </div>

    <!-- ВТОРОЙ ЭКРАН: фон fon4.jpg, справа белая колонка 60% с текстом и календарём -->
    <div class="screen screen-second">
        <div class="empty"></div> <!-- 40% пустоты -->
        <div class="right-column">
            <div class="greeting">ДОРОГИЕ<br> ГОСТИ!</div>
            <div class="invite-text">
                Приглашаем вас разделить с нами радость особенного для нас события и стать частью нашей семейной истории.
            </div>
            <!-- Календарь (август 2026, выделено 9 число) -->
            <div class="calendar">
                <div class="month">АВГУСТ 2026</div>
                <div class="calendar-grid">
                    <div class="weekday">ПН</div><div class="weekday">ВТ</div><div class="weekday">СР</div><div class="weekday">ЧТ</div><div class="weekday">ПТ</div><div class="weekday">СБ</div><div class="weekday">ВС</div>
                    <div class="calendar-day"></div><div class="calendar-day"></div><div class="calendar-day"></div><div class="calendar-day"></div><div class="calendar-day"></div><div class="calendar-day">1</div><div class="calendar-day">2</div>
                    <div class="calendar-day">3</div><div class="calendar-day">4</div><div class="calendar-day">5</div><div class="calendar-day">6</div><div class="calendar-day">7</div><div class="calendar-day">8</div><div class="calendar-day highlight">9</div>
                    <div class="calendar-day">10</div><div class="calendar-day">11</div><div class="calendar-day">12</div><div class="calendar-day">13</div><div class="calendar-day">14</div><div class="calendar-day">15</div><div class="calendar-day">16</div>
                    <div class="calendar-day">17</div><div class="calendar-day">18</div><div class="calendar-day">19</div><div class="calendar-day">20</div><div class="calendar-day">21</div><div class="calendar-day">22</div><div class="calendar-day">23</div>
                    <div class="calendar-day">24</div><div class="calendar-day">25</div><div class="calendar-day">26</div><div class="calendar-day">27</div><div class="calendar-day">28</div><div class="calendar-day">29</div><div class="calendar-day">30</div>
                    <div class="calendar-day">31</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
