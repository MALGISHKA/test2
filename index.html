<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Михаил & Полина | Свадебное приглашение</title>
    <style>
        @font-face {
            font-family: 'Flores del Sol';
            src: url('fonts/Flores del Sol.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Better Land RUS';
            src: url('fonts/Better Land RUS.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            scroll-behavior: smooth;
        }

        /* ----- ФОНЫ (ФИКСИРОВАННЫЕ, ЛЕВАЯ И ПРАВАЯ ПОЛОВИНЫ) ----- */
        .bg-left {
            position: fixed;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background-image: url('images/fon2.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }
        .bg-right {
            position: fixed;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background-image: url('images/fon3.jpg');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        /* ----- ЭКРАН С ЗАМКОМ (фон fon2.jpg) ----- */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/fon2.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: transform 0.8s ease, opacity 0.5s ease;
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }
        .lock-screen::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }
        .lock-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            max-width: 360px;
            width: 100%;
            margin: 0 auto;
        }
        .lock-text-top {
            font-size: 1.2rem;
            letter-spacing: 6px;
            color: white;
            font-weight: 300;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .lock-text-highlight {
            font-size: clamp(32px, 8vw, 54px);
            font-weight: 500;
            color: white;
            margin-bottom: 32px;
            line-height: 1.2;
        }
        .lock-circle {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .lock-white {
            width: 100px;
            cursor: pointer;
            transition: transform 0.2s;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
        }
        .lock-white:active {
            transform: scale(0.96);
        }
        .unlock-box {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            padding: 12px 24px;
            display: inline-block;
            margin-top: 20px;
            font-size: 1rem;
            color: white;
            backdrop-filter: blur(4px);
            cursor: pointer;
        }
        body.unlocked .lock-screen {
            transform: translateY(-100%);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* ----- ОСНОВНАЯ ЧАСТЬ (КОЛОНКИ ПОВЕРХ ФОНОВ) ----- */
        .invitation-container {
            opacity: 0;
            transition: opacity 0.9s ease 0.2s;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }
        body.unlocked .invitation-container {
            opacity: 1;
        }

        /* Левая колонка (белая, полупрозрачная) */
        .left-column {
            width: 40%;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.92);
            padding: 40px 40px 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 10px 0 20px rgba(0, 0, 0, 0.05);
        }

        /* Правая колонка (белая, полупрозрачная, анимация) */
        .right-column {
            width: 60%;
            background: rgba(255, 255, 255, 0.92);
            padding: 60px 60px 60px 40px;
            margin-left: auto;
            box-shadow: -10px 0 20px rgba(0, 0, 0, 0.05);
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .right-column.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Стили левой колонки (чёрный текст) */
        .initial-large {
            font-family: 'Flores del Sol', 'Georgia', serif;
            font-size: 180px;
            line-height: 1;
            color: #000;
            margin: 10px 0;
        }
        .dotted-line {
            border-top: 3px dashed #000;
            width: 140px;
            margin: 15px 0;
        }
